<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TrustLedger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .login-title {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            color: #fff;
            font-family: var(--font-main);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--accent-cyan);
        }

        .login-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .login-footer a {
            color: var(--accent-cyan);
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .role-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .role-employer {
            background: rgba(255, 107, 107, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .role-freelancer {
            background: rgba(240, 101, 149, 0.1);
            color: var(--accent-violet);
            border: 1px solid rgba(240, 101, 149, 0.3);
        }
    </style>
</head>

<body>

    <!-- Background Effects -->
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="login-wrapper container">
        <div class="glass-card login-card">
            <div class="login-header">
                <a href="index.html" class="login-logo text-center" style="text-decoration: none;">TrustLedger</a>
                <div id="roleBadgeContainer">
                    <span class="role-badge role-employer" id="roleBadge" style="display: none;">Employer Portal</span>
                </div>
                <h1 class="login-title" id="loginTitle">Welcome Back</h1>
                <p class="login-subtitle" id="loginSubtitle">Sign in to manage your autonomous escrows.</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="loginBtn">
                    Sign In to Dashboard
                </button>
                    
                <div style="display: flex; align-items: center; justify-content: center; margin: 1.5rem 0;">
                    <hr style="flex-grow: 1; border: none; border-top: 1px solid var(--border-glass);">
                    <span style="padding: 0 1rem; color: var(--text-secondary); font-size: 0.9rem;">OR</span>
                    <hr style="flex-grow: 1; border: none; border-top: 1px solid var(--border-glass);">
                </div>

                <button type="button" id="googleLoginBtn" class="btn btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border-glass); padding: 1rem 1.25rem; border-radius: 12px; color: #fff; cursor: pointer; transition: all 0.3s ease;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>
            </form>

            <div class="login-footer">
                <p>Don't have an account? <a href="index.html">Request Access</a></p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('trustledgerRole') || 'employer';

            const badge = document.getElementById('roleBadge');
            const title = document.getElementById('loginTitle');
            const subtitle = document.getElementById('loginSubtitle');
            const emailInput = document.getElementById('email');

            badge.style.display = 'inline-block';

            if (role === 'freelancer') {
                badge.className = 'role-badge role-freelancer';
                badge.textContent = 'Freelancer Portal';
                title.textContent = 'Welcome, Talent';
                subtitle.textContent = 'Sign in to view your milestones and get paid.';
                emailInput.placeholder = 'you@portfolio.com';
            } else {
                badge.className = 'role-badge role-employer';
                badge.textContent = 'Employer Portal';
                title.textContent = 'Welcome, Client';
                subtitle.textContent = 'Sign in to fund escrows and approve work.';
                emailInput.placeholder = 'name@company.com';
            }

            document.getElementById('loginForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const btn = document.getElementById('loginBtn');
                btn.textContent = 'Authenticating...';
                btn.disabled = true;

                // Simulate login delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            });
            
            // Google Login Logic
            document.getElementById('googleLoginBtn').addEventListener('click', function() {
                const originalText = this.innerHTML;
                this.innerHTML = "Authenticating...";
                this.disabled = true;

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            });
        });
    </script>
</body>

</html>
